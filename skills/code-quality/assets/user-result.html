<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码质量评估报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --color-green: #22c55e;
    --color-yellow: #eab308;
    --color-red: #ef4444;
    --color-obj: #3b82f6;
    --color-enc: #22c55e;
    --color-vic: #ef4444;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 28px; font-weight: 700; text-align: center; padding: 32px 0 8px; }
  .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
  /* Navigation */
  .nav { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .nav-label { font-weight: 600; color: var(--text-secondary); font-size: 14px; }
  .nav a { color: var(--color-obj); text-decoration: none; font-size: 14px; font-weight: 500; }
  .nav a:hover { text-decoration: underline; }
  /* Card */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  /* Overview */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .overview-item { padding: 12px 16px; background: #f1f5f9; border-radius: 8px; }
  .overview-item .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .overview-item .value { font-size: 15px; font-weight: 600; word-break: break-all; }
  /* Score cards */
  .score-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .score-card { border-radius: 12px; padding: 24px; text-align: center; color: #fff; position: relative; overflow: hidden; }
  .score-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; background: rgba(255,255,255,.1); border-radius: 50%; }
  .score-card .role { font-size: 14px; opacity: .9; margin-bottom: 8px; }
  .score-card .score { font-size: 48px; font-weight: 800; line-height: 1; }
  .score-card .score-max { font-size: 16px; font-weight: 400; opacity: .7; }
  .score-card .time { font-size: 12px; opacity: .7; margin-top: 8px; }
  .score-bg-green { background: linear-gradient(135deg, #22c55e, #16a34a); }
  .score-bg-yellow { background: linear-gradient(135deg, #eab308, #ca8a04); }
  .score-bg-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .score-bg-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  /* Radar chart */
  .radar-wrapper { display: flex; justify-content: center; align-items: center; padding: 16px 0; }
  .radar-wrapper canvas { max-width: 560px; max-height: 560px; }
  /* Table */
  .dim-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .dim-table th { background: #f1f5f9; padding: 10px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); white-space: nowrap; }
  .dim-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .dim-table tr:hover { background: #f8fafc; }
  .score-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-weight: 600; font-size: 13px; color: #fff; min-width: 48px; text-align: center; }
  .weight-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #e2e8f0; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  /* Collapsible comments */
  .comment-toggle { cursor: pointer; color: var(--color-obj); font-size: 13px; user-select: none; display: inline-flex; align-items: center; gap: 4px; }
  .comment-toggle:hover { text-decoration: underline; }
  .comment-content { display: none; margin-top: 8px; padding: 10px 12px; background: #f8fafc; border-radius: 6px; font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
  .comment-content.open { display: block; }
  .comment-label { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
  .comment-label.obj { color: var(--color-obj); }
  .comment-label.enc { color: var(--color-enc); }
  .comment-label.vic { color: var(--color-red); }
  .comment-block { margin-bottom: 8px; }
  .comment-block:last-child { margin-bottom: 0; }
  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .tab-btn { padding: 10px 24px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--color-obj); border-bottom-color: var(--color-obj); font-weight: 600; }
  .tab-panel { display: none; font-size: 14px; line-height: 1.8; color: var(--text-secondary); padding: 4px 0; }
  .tab-panel.active { display: block; }
  /* Responsive */
  @media (max-width: 768px) {
    .score-cards { grid-template-columns: 1fr; }
    .overview-grid { grid-template-columns: 1fr 1fr; }
    .dim-table { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const RAW_DATA = {};

function getScoreColor(score) {
  if (score >= 4) return 'green';
  if (score >= 3) return 'yellow';
  return 'red';
}
function getScoreBg(score) {
  if (score >= 4) return '#22c55e';
  if (score >= 3) return '#eab308';
  return '#ef4444';
}
function getCardClass(score) {
  if (score >= 4) return 'score-bg-green';
  if (score >= 3) return 'score-bg-yellow';
  return 'score-bg-red';
}
const CHARACTER_MAP = { objective: '客观型', encouraging: '鼓励型', vicious: '恶毒型' };
const CHARACTER_COLORS = { objective: 'var(--color-obj)', encouraging: 'var(--color-enc)', vicious: 'var(--color-vic)' };
const CHARACTER_CHART_COLORS = {
  objective: { bg: 'rgba(59,130,246,.15)', border: 'rgba(59,130,246,.8)' },
  encouraging: { bg: 'rgba(34,197,94,.15)', border: 'rgba(34,197,94,.8)' },
  vicious: { bg: 'rgba(239,68,68,.15)', border: 'rgba(239,68,68,.8)' }
};
const DIM_NAMES = {
  commit_log: 'Commit Log', comment: '注释', log: '日志', unit_test: '单元测试',
  complexity: '复杂度', scalability: '扩展性', exception_handling: '异常处理',
  refactoring: '重构', business_code_contribution: '业务代码贡献', new_syntax_features: '新语法新特性'
};
const DIM_ORDER = ['commit_log','comment','log','unit_test','complexity','scalability','exception_handling','refactoring','business_code_contribution','new_syntax_features'];

function groupByEmployee(results) {
  const map = {};
  for (const r of results) {
    const key = r.account;
    if (!map[key]) map[key] = { account: r.account, repoPath: r.repoPath, branch: r.branch, commitLog: r.commitLog, roles: {} };
    map[key].roles[r.character] = r;
  }
  return Object.values(map);
}

function countCommits(commitLog) {
  if (!commitLog) return 0;
  return (commitLog.match(/^commit [0-9a-f]{40}$/gm) || []).length;
}

function render() {
  const data = RAW_DATA;
  const employees = groupByEmployee(data.userResults);
  const app = document.getElementById('app');
  let html = '';
  html += '<h1>代码质量评估报告</h1>';
  html += `<div class="subtitle">生成时间：${new Date(data.generatedAt).toLocaleString('zh-CN')} | 评估记录：${data.resultCount} 条</div>`;

  if (employees.length > 1) {
    html += '<div class="nav"><span class="nav-label">导航：</span>';
    employees.forEach((emp, i) => {
      const firstRole = Object.values(emp.roles)[0];
      const name = firstRole.name || firstRole.nickName || emp.account;
      html += `<a href="#emp-${i}">${name}（${emp.account}）</a>`;
    });
    html += '</div>';
  }

  employees.forEach((emp, empIdx) => {
    const roles = emp.roles;
    const firstRole = Object.values(roles)[0];
    const commitCount = countCommits(emp.commitLog);

    html += `<div id="emp-${empIdx}">`;

    // Overview
    html += '<div class="card"><div class="card-title">员工概览</div><div class="overview-grid">';
    const overviewItems = [
      { label: '姓名', value: firstRole.name || '-' },
      { label: '花名', value: firstRole.nickName || '-' },
      { label: '部门', value: firstRole.depDesc || '-' },
      { label: '账号', value: emp.account },
      { label: '仓库', value: emp.repoPath },
      { label: '分支', value: emp.branch },
      { label: '提交数量', value: commitCount + ' commits' },
      { label: '评估时间', value: new Date(data.generatedAt).toLocaleString('zh-CN') },
      { label: '平均分', value: firstRole.averageScore || '-' },
    ];
    // Try to get name/nickName/depDesc from repos query result embedded in any role
    for (const r of Object.values(roles)) {
      if (r.name) overviewItems[0].value = r.name;
      if (r.nickName) overviewItems[1].value = r.nickName;
      if (r.depDesc) overviewItems[2].value = r.depDesc;
    }
    overviewItems.forEach(item => {
      html += `<div class="overview-item"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>`;
    });
    html += '</div></div>';

    // Score Cards
    html += '<div class="score-cards">';
    ['objective', 'encouraging', 'vicious'].forEach(ch => {
      const r = roles[ch];
      if (!r) return;
      html += `<div class="score-card ${getCardClass(r.totalScore)}">
        <div class="role">${r.characterDesc || CHARACTER_MAP[ch]}</div>
        <div class="score">${r.totalScore.toFixed(2)}<span class="score-max"> / 5</span></div>
        <div class="time">模型：${r.modelName} | 耗时：${r.consumeTime.toFixed(0)}s</div>
      </div>`;
    });
    html += '</div>';

    // Radar Chart
    html += `<div class="card"><div class="card-title">维度评分雷达图</div><div class="radar-wrapper"><canvas id="radar-${empIdx}" width="560" height="560"></canvas></div></div>`;

    // Dimension Table
    html += '<div class="card"><div class="card-title">维度明细</div>';
    html += '<div style="overflow-x:auto;"><table class="dim-table"><thead><tr>';
    html += '<th>维度</th><th>权重</th>';
    ['objective', 'encouraging', 'vicious'].forEach(ch => {
      if (roles[ch]) html += `<th>${roles[ch].characterDesc || CHARACTER_MAP[ch]}</th>`;
    });
    html += '<th>评语详情</th></tr></thead><tbody>';

    DIM_ORDER.forEach(dimKey => {
      const dimName = DIM_NAMES[dimKey] || dimKey;
      const firstDim = Object.values(roles).find(r => r.dimensions[dimKey])?.dimensions[dimKey];
      if (!firstDim) return;
      const weight = firstDim.weight;
      const toggleId = `comment-${empIdx}-${dimKey}`;

      html += '<tr>';
      html += `<td><strong>${dimName}</strong></td>`;
      html += `<td><span class="weight-badge">${'★'.repeat(weight)}</span></td>`;
      ['objective', 'encouraging', 'vicious'].forEach(ch => {
        if (!roles[ch]) return;
        const dim = roles[ch].dimensions[dimKey];
        if (dim) {
          html += `<td><span class="score-badge" style="background:${getScoreBg(dim.score)}">${dim.score.toFixed(2)}</span></td>`;
        } else {
          html += '<td>-</td>';
        }
      });
      html += `<td><span class="comment-toggle" onclick="toggleComment('${toggleId}')">展开评语 ▾</span>`;
      html += `<div class="comment-content" id="${toggleId}">`;
      ['objective', 'encouraging', 'vicious'].forEach(ch => {
        if (!roles[ch]) return;
        const dim = roles[ch].dimensions[dimKey];
        if (dim) {
          const labelClass = ch === 'objective' ? 'obj' : ch === 'encouraging' ? 'enc' : 'vic';
          html += `<div class="comment-block"><div class="comment-label ${labelClass}">${roles[ch].characterDesc || CHARACTER_MAP[ch]}</div><div>${dim.comment}</div></div>`;
        }
      });
      html += '</div></td></tr>';
    });
    html += '</tbody></table></div></div>';

    // Overall Comment Tabs
    html += '<div class="card"><div class="card-title">整体评语</div>';
    html += `<div class="tabs" id="tabs-${empIdx}">`;
    ['objective', 'encouraging', 'vicious'].forEach((ch, i) => {
      if (!roles[ch]) return;
      html += `<button class="tab-btn${i === 0 ? ' active' : ''}" onclick="switchTab('${empIdx}','${ch}')">${roles[ch].characterDesc || CHARACTER_MAP[ch]}</button>`;
    });
    html += '</div>';
    ['objective', 'encouraging', 'vicious'].forEach((ch, i) => {
      if (!roles[ch]) return;
      html += `<div class="tab-panel${i === 0 ? ' active' : ''}" id="panel-${empIdx}-${ch}">${roles[ch].overallComment}</div>`;
    });
    html += '</div>';

    html += '</div>'; // emp block
  });

  app.innerHTML = html;

  // Draw radar charts
  employees.forEach((emp, empIdx) => {
    const ctx = document.getElementById(`radar-${empIdx}`);
    if (!ctx) return;
    const labels = DIM_ORDER.map(k => DIM_NAMES[k] || k);
    const datasets = [];
    ['objective', 'encouraging', 'vicious'].forEach(ch => {
      const r = emp.roles[ch];
      if (!r) return;
      datasets.push({
        label: r.characterDesc || CHARACTER_MAP[ch],
        data: DIM_ORDER.map(k => r.dimensions[k]?.score || 0),
        backgroundColor: CHARACTER_CHART_COLORS[ch].bg,
        borderColor: CHARACTER_CHART_COLORS[ch].border,
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: CHARACTER_CHART_COLORS[ch].border,
      });
    });
    new Chart(ctx, {
      type: 'radar',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0, max: 5,
            ticks: { stepSize: 1, font: { size: 12 }, backdropColor: 'transparent' },
            pointLabels: { font: { size: 13, weight: '500' } },
            grid: { color: 'rgba(0,0,0,.08)' },
            angleLines: { color: 'rgba(0,0,0,.08)' }
          }
        },
        plugins: {
          legend: { position: 'bottom', labels: { padding: 20, font: { size: 13 } } }
        }
      }
    });
  });
}

function toggleComment(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('open');
    const toggle = el.previousElementSibling;
    if (toggle) toggle.textContent = el.classList.contains('open') ? '收起评语 ▴' : '展开评语 ▾';
  }
}

function switchTab(empIdx, ch) {
  const tabs = document.getElementById(`tabs-${empIdx}`);
  if (!tabs) return;
  tabs.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll(`[id^="panel-${empIdx}-"]`).forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  const panel = document.getElementById(`panel-${empIdx}-${ch}`);
  if (panel) panel.classList.add('active');
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
